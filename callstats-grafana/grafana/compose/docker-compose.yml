# =============================================================================
# callstats-grafana / Grafana / docker-compose.yml
#
# Ставится на VM в /opt/grafana/docker-compose.yml
# Значения GF_SECURITY_ADMIN_PASSWORD берутся из .env рядом с этим файлом.
# =============================================================================

version: "3.8"

services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SERVER_HTTP_PORT=3000
      - GF_DEFAULT_LANGUAGE=ru-RU
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_DEFAULT_LANGUAGE=ru-RU
    volumes:
      - ./data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/etc/grafana/dashboards
    # host.docker.internal нужен, чтобы контейнер видел SSH-туннель на 127.0.0.1:3307 хоста
    extra_hosts:
      - "host.docker.internal:host-gateway"
